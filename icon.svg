  <!-- Football white base -->
  <circle cx="256" cy="256" r="148" fill="#ffffff" stroke="#cccccc" stroke-width="1.5"/>

  <!-- Classic soccer ball pattern (Telstar-style) -->
  <!-- Center pentagon (black) -->
