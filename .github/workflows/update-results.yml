name: WM Ergebnisse aktualisieren

on:
  schedule:
    - cron: '0 20 * * *'  # 22:00 MESZ — nach den Abendspielen
    - cron: '0  2 * * *'  # 04:00 MESZ — nach den Nachtspielen
    - cron: '0  6 * * *'  # 08:00 MESZ — Fallback für alle Vortagsergebnisse
  workflow_dispatch:
    # Jederzeit manuell auslösbar: GitHub → Actions → "WM Ergebnisse aktualisieren" → Run workflow

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Ergebnisse holen und in Firebase schreiben
        env:
          FOOTBALL_API_KEY:    ${{ secrets.FOOTBALL_API_KEY }}
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_DB_SECRET:  ${{ secrets.FIREBASE_DB_SECRET }}
        run: node .github/scripts/update-results.js
